<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>conductors</title>
        <link rel="stylesheet" type="text/css" href="../client/main.css" />
        <link rel="stylesheet" type="text/css" href="styles.css" />
        <script>window.NYPHIL_DATA_ROOT = "../";</script>
        <script src="../client/filters.js"></script>
        <script>
            const ARCHIVE = "https://archives.nyphil.org/index.php/artifact/";
            const state = { index: null, names: [] };

            function archiveLink(id) {
                return ARCHIVE + id + "/fullview";
            }

            window.onload = () => {
                fetch(nyphilDataUrl("conductors_index.json"))
                    .then((r) => r.json())
                    .then((idx) => {
                        state.index = idx;
                        state.names = Object.keys(idx).sort();
                        renderNameList();
                    })
                    .catch(() => {
                        state.index = {};
                        state.names = [];
                        renderNameList();
                    });
            };

            function renderNameList() {
                const ul = document.getElementById("conductor-list");
                ul.innerHTML = "";
                const q = (
                    document.getElementById("conductor-search").value || ""
                ).toLowerCase();
                state.names.forEach((name) => {
                    if (q && name.toLowerCase().indexOf(q) === -1) return;
                    const li = document.createElement("li");
                    const btn = document.createElement("button");
                    btn.type = "button";
                    btn.textContent = name;
                    btn.addEventListener("click", () => selectConductor(name));
                    li.appendChild(btn);
                    ul.appendChild(li);
                });
            }

            function selectConductor(name) {
                document.getElementById("detail-title").textContent = name;
                const rows = state.index[name] || [];
                const tb = document.getElementById("tbody-appearances");
                tb.innerHTML = "";
                rows.forEach((row) => {
                    const tr = document.createElement("tr");

                    const dateTd = document.createElement("td");
                    dateTd.textContent = row.date || "";
                    tr.appendChild(dateTd);

                    const compTd = document.createElement("td");
                    compTd.textContent = row.composerName || "";
                    tr.appendChild(compTd);

                    const workTd = document.createElement("td");
                    const title = document.createElement("span");
                    title.textContent = row.workTitle || "";
                    workTd.appendChild(title);
                    if (row.sharedCredit) {
                        const badge = document.createElement("span");
                        badge.className = "shared-credit-badge";
                        badge.textContent = "shared";
                        workTd.appendChild(document.createTextNode(" "));
                        workTd.appendChild(badge);
                    }
                    tr.appendChild(workTd);

                    const td = document.createElement("td");
                    const a = document.createElement("a");
                    a.href = archiveLink(row.programId);
                    a.target = "_blank";
                    a.rel = "noopener";
                    a.textContent = "program";
                    td.appendChild(a);
                    tr.appendChild(td);
                    tb.appendChild(tr);
                });
            }

            function onSearchInput() {
                renderNameList();
            }
        </script>
    </head>
    <body>
        <div class="nyphil-filters-bar">
            <div class="nyphil-filters-bar-inner">
            <nav class="nyphil-filters" aria-label="Concert filter">
                <label for="nyphil-preset-select">Concerts</label>
                <select id="nyphil-preset-select">
                    <option value="all">All event types</option>
                    <option value="subscription_season">Subscription season</option>
                </select>
            </nav>
            <a href="../index.html" class="nyphil-back-link">back</a>
            </div>
            <script>
                (function () {
                    var sel = document.getElementById("nyphil-preset-select");
                    if (sel) {
                        sel.value = NYPHIL_PRESET;
                        sel.addEventListener("change", function () {
                            nyphilSwitchPreset(sel.value);
                        });
                    }
                })();
            </script>
        </div>
        <header>
            <h1>conductors</h1>
            <p class="lead">
                Search a conductor and browse appearances
            </p>
        </header>
        <main class="conductors-layout">
            <aside>
                <label for="conductor-search">Name contains</label>
                <input
                    type="search"
                    id="conductor-search"
                    oninput="onSearchInput()"
                    placeholder="filter list"
                />
                <ul id="conductor-list" class="name-list"></ul>
            </aside>
            <section class="detail">
                <h2 id="detail-title">Select a conductor</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Composer</th>
                                <th>Work</th>
                                <th>Program</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-appearances"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </body>
</html>
