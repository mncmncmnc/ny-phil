<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="index,follow" />
        <meta name="googlebot" content="index,follow" />
        <meta name="description" content="" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="soloists" />
        <meta property="og:description" content="instruments" />
        <meta name="theme-color" content="#fff">
        <title>instruments</title>
        <script>window.NYPHIL_DATA_ROOT = "../../";</script>
        <script src="../../client/filters.js"></script>
        <script src="../../client/instrument_speaker_roles.js"></script>
        <script src="./../../client/vendor/d3.min.js"></script>
        <link rel="stylesheet" type="text/css" href="./../../client/main.css" />
        <link rel="stylesheet" type="text/css" href="../../client/instrument_speaker_roles.css" />
        <link rel="stylesheet" type="text/css" href="./styles.css" />
        <!-- <link rel="icon" href="favicon.ico" /> -->

        <script>
            const state = {
                instruments: {},
                totalPerYear: {},
                filtered: {},
                colors: {},
                includeSpeakers: false,
                speakerBreakdown: false,
                includeDancers: false,
                dancerBreakdown: false,
                start: 1842,
                end: new Date().getYear() + 1900,
                scales: {
                    x: null,
                    y: null,
                },
                band: 40,
                dim: [window.innerWidth - 40, window.innerHeight - 30]
            }
            String.prototype.hashCode = function() {
                var hash = 0, i, chr;
                if (this.length === 0) return hash;
                for (i = 0; i < this.length; i++) {
                    chr   = this.charCodeAt(i);
                    hash  = ((hash << 5) - hash) + chr;
                    hash |= 0; // Convert to 32bit integer
                }
                return hash;
            };
            function initInstrumentExceptionPanels() {
                const inc = document.getElementById("nyphil-include-speaker-roles");
                const br = document.getElementById("nyphil-speaker-roles-breakdown");
                if (inc && br) {
                    br.disabled = true;
                    inc.addEventListener("change", () => {
                        state.includeSpeakers = inc.checked;
                        if (!inc.checked) {
                            br.checked = false;
                            br.disabled = true;
                            state.speakerBreakdown = false;
                        } else {
                            br.disabled = false;
                        }
                        updatePage();
                    });
                    br.addEventListener("change", () => {
                        state.speakerBreakdown = br.checked;
                        updatePage();
                    });
                }
                const incD = document.getElementById("nyphil-include-dancer-roles");
                const brD = document.getElementById("nyphil-dancer-roles-breakdown");
                if (incD && brD) {
                    brD.disabled = true;
                    incD.addEventListener("change", () => {
                        state.includeDancers = incD.checked;
                        if (!incD.checked) {
                            brD.checked = false;
                            brD.disabled = true;
                            state.dancerBreakdown = false;
                        } else {
                            brD.disabled = false;
                        }
                        updatePage();
                    });
                    brD.addEventListener("change", () => {
                        state.dancerBreakdown = brD.checked;
                        updatePage();
                    });
                }
            }

            window.onload = () => {
                initInstrumentExceptionPanels();
                setDateDropdowns();
                getData();
            }

            function getData() {
                fetch(nyphilDataUrl("soloist-instruments-by-season-count.json"))
                    .then(res => res.json())
                    .then(instruments => {
                        state.instruments = instruments;

                        updatePage()
                    })
            }

            function setTotalPerYear() {
                state.totalPerYear = {}
                Object.keys(state.instruments).forEach(instrument => {
                    Object.keys(state.instruments[instrument]).forEach(year => {
                        if (year >= state.start && year <= state.end) {
                            if (!state.totalPerYear[year]) {
                                state.totalPerYear[year] = 0
                            }
                            state.totalPerYear[year] += state.instruments[instrument][year]
                        }
                    })
                })
            }

            function setDateDropdowns() {
                const start = document.getElementById('select-start')
                const end = document.getElementById('select-end')

                let option = document.createElement('option')
                option.value = ''
                option.innerHTML = 'Select start'
                option.disabled = true
                start.append(option)

                option = document.createElement('option')
                option.value = ''
                option.innerHTML = 'Select end'
                option.disabled = true
                end.append(option)
                
                let i = state.start;
                while (i <= state.end) {
                    option = document.createElement('option')
                    option.innerHTML = i;
                    option.value = i;

                    start.append(option)
                    end.append(option.cloneNode(true))
                    i += 1
                }

                start.value = state.start;
                end.value = state.end;
            }

            function updateRange(key, value) {
                state.page = 0;
                state[key] = parseInt(value, 10);

                updatePage();
            }

            function getDateFromYear(year) {
                return new Date(year, 0, 1)
            }

            function setScales() {
                const svg = d3.select('#chart')
                state.scales.x = d3.scaleTime()
                    .domain([getDateFromYear(state.start), getDateFromYear(state.end + 1)])
                    .range([1, state.dim[0]]);

                svg.append("g")
                    .style("transform", "translate(0," + state.dim[1] + "px)")
                    .call(d3.axisBottom(state.scales.x));

                const instruments = nyphilInstrumentExceptionYDomain(
                    Object.keys(state.filtered)
                );

                state.scales.y = d3.scaleLinear()
                    .domain([0, 1])
                    .range([ state.dim[1], 30]);

                state.scales.colors = d3.scaleOrdinal()
                    .domain(instruments)
                    .range(["#5E4FA2", "#3288BD", "#66C2A5", "#ABDDA4", "#bad62a", "#dbdb42", "#ffc41b", "#F46D43", "#D53E4F", "#9E0142"])
            }

            function updatePage() {
                const chart = d3.select('#chart')
                chart.selectAll('*').remove()
                let count = 0;

                setTotalPerYear()

                const view = nyphilBuildInstrumentChartView(
                    state.instruments,
                    state.start,
                    state.end,
                    {
                        includeSpeakers: state.includeSpeakers,
                        speakerBreakdown: state.speakerBreakdown,
                        includeDancers: state.includeDancers,
                        dancerBreakdown: state.dancerBreakdown,
                    }
                );

                const filtered = {}
                Object.keys(view)
                    // .filter(key => key.startsWith('ka'))
                    // .filter(key => {
                    //     return d3.max(Object.values(state.instruments[key])) > 10
                    // })
                    .forEach(instrument => {
                        let arr = Object.keys(view[instrument])
                            .map(year => (
                                {
                                    year: +year, 
                                    value: state.totalPerYear[+year]
                                        ? view[instrument][year] / state.totalPerYear[+year]
                                        : 0,
                                }
                            ))
                        arr = arr
                            .filter(d => d.year >= state.start && d.year <= state.end)
                            .sort((a,b) => a.year - b.year)

                        if (arr.length > 0) {
                            arr.unshift({year: arr[0].year, value: 0})
                            arr.unshift({year: state.start, value: 0})
                            arr.push({year: arr[arr.length - 1].year, value: 0})
                            arr.push({year: state.end, value: 0})
                            filtered[instrument] = arr
                        }
                    })

                state.filtered = filtered

                state.dim = [1000, 800]

                setScales()
                
                chart.attr('viewBox', `0 0 ${state.dim[0] + 40} ${state.dim[1] + 30}`)

                const lineOrder = nyphilInstrumentExceptionYDomain(
                    Object.keys(state.filtered)
                );
                const g = chart.selectAll('.instrument')
                    .data(
                        lineOrder.map(key => (
                                {
                                    instrument: key,
                                    values: state.filtered[key],
                                }
                            ))
                    ).enter()
                        .append('g')
                        .attr('class', 'instrument')

                const lines = g.selectAll('g')
                    .data(d => [d.values])
                    .enter()
                        .append('g')
                
                lines.append('path')
                    .style("stroke-width", 2)
                    .attr('data-instrument', function () {
                        const i = d3.select(this).node().parentNode.parentNode
                        return d3.select(i).datum().instrument;
                    })
                    .style('stroke', function() {
                        return state.scales.colors(d3.select(this).attr('data-instrument'))
                    })
                    .style('fill', function() {
                        return state.scales.colors(d3.select(this).attr('data-instrument'))
                    })
                    .attr("d", d3.line()
                        .x(function(d) { return state.scales.x(getDateFromYear(d.year)) })
                        .y(function(d) { return state.scales.y(d.value) })
                        .curve(d3.curveStep)
                    )
                
                // g.append('rect')
                //     .attr('width', state.dim[0] - 130)
                //     .attr('height', state.band)
                //     .style('transform', `translate(130px, 0)`)
                //     .style('fill', d => state.scales.colors(d.instrument))
                //     .style('opacity', 0.2)
                // g.append('line')
                //     .attr('x1', 130)
                //     .attr('x2', state.dim[0])
                //     .attr('y1', state.band/2)
                //     .attr('y2', state.band/2)
                //     .style('stroke', d => state.scales.colors(d.instrument))
                //     .style('stroke-width', 1)
                //     .style('opacity', 0.2)
                
                // g.selectAll('rect.bar')
                //     .data(d => d.values)
                //     .enter()
                //         .append('rect')
                //         .attr('class', 'bar')
                //         .attr('data-instrument', function () {
                //             const i = d3.select(this).node().parentNode;
                //             return d3.select(i).datum().instrument;
                //         })
                //         .attr('height', d => state.scales.frequency(d.value))
                //         .attr('width', d => state.scales.x(getDateFromYear(d.year)) - state.scales.x(getDateFromYear(d.year - 1)) + 1)
                //         .style('transform', d => `translate(${state.scales.x(getDateFromYear(d.year))}px, ${state.band/2 + (state.scales.frequency(d.value))/-2}px)`)
                //         .style('fill', function() {
                //             return state.scales.colors(d3.select(this).attr('data-instrument'))
                //         })
                
                
                lineOrder.forEach(() => {
                    count += 1;
                })

                document.querySelector('#count').innerText = count;
            }
        </script>
    </head>
    <body>
        <div class="nyphil-filters-bar">
            <div class="nyphil-filters-bar-inner">
            <nav class="nyphil-filters" aria-label="Concert filter">
                <label for="nyphil-preset-select">Concerts</label>
                <select id="nyphil-preset-select">
                    <option value="all">All event types</option>
                    <option value="subscription_season">Subscription season</option>
                </select>
            </nav>
            <a href="../../index.html" class="nyphil-back-link">back</a>
            </div>
            <script>
                (function () {
                    var sel = document.getElementById("nyphil-preset-select");
                    if (sel) {
                        sel.value = NYPHIL_PRESET;
                        sel.addEventListener("change", function () {
                            nyphilSwitchPreset(sel.value);
                        });
                    }
                })();
            </script>
        </div>
        <header>
            <h1>
                <span id="count"></span> instruments
            </h1>
            <div class="subtitle">
                <h2> from </h2>
                <select id="select-start" onchange="updateRange('start', this.value)"></select>
                <h2> to </h2>
                <select id="select-end" onchange="updateRange('end', this.value)"></select>
            </div>
        </header>
        <main>
            <div id="container">
                <div id="highlight-text">
                    &nbsp;
                </div>
                <svg id="chart"></svg>
            </div>
        </main>
        <section class="nyphil-chart-exception-panel" aria-labelledby="nyphil-exception-speakers-heading">
            <h3 class="nyphil-chart-exception-title" id="nyphil-exception-speakers-heading">Speakers, Actors, and Readers</h3>
            <label class="nyphil-chart-exception-label">
                <input type="checkbox" id="nyphil-include-speaker-roles" />
                Include in chart
            </label>
            <div class="nyphil-chart-exception-nested">
                <label class="nyphil-chart-exception-label">
                    <input type="checkbox" id="nyphil-speaker-roles-breakdown" />
                    Show each role separately instead of the combined series
                </label>
            </div>
        </section>
        <section class="nyphil-chart-exception-panel" aria-labelledby="nyphil-exception-dancers-heading">
            <h3 class="nyphil-chart-exception-title" id="nyphil-exception-dancers-heading">Dancers and Movement Artists</h3>
            <label class="nyphil-chart-exception-label">
                <input type="checkbox" id="nyphil-include-dancer-roles" />
                Include in chart
            </label>
            <div class="nyphil-chart-exception-nested">
                <label class="nyphil-chart-exception-label">
                    <input type="checkbox" id="nyphil-dancer-roles-breakdown" />
                    Show each role separately instead of the combined series
                </label>
            </div>
        </section>
    </body>
</html>
